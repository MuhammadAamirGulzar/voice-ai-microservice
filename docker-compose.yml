version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PUBLIC_IP: ${PUBLIC_IP:-}
    volumes:
      - ./logs:/app/logs
      - ./google-credentials.json:/app/google-credentials.json:ro
    ports:
      - "18020:8000"
      - "51000-51100:51000-51100/udp"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "127.0.0.1:28021:80"
    restart: unless-stopped
